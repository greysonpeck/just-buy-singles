<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/output.css?v=1.46" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <title>Catalog: Marvel Super Heroes — Just Buy Singles</title>
    <style>
        body {
            background-image: url('img/MSH_bg.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
            pointer-events: none;
        }
        #page {
            position: relative;
            z-index: 1;
        }
        /* Mode toggle */
        .ma-toggle {
            display: inline-flex;
            border-radius: 8px;
            overflow: hidden;
        }
        .ma-toggle button {
            padding: 7px 22px;
            font-size: 0.875rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            color: white;
        }
        .ma-btn-active {
            background: linear-gradient(to bottom, rgba(80, 50, 150, 0.95), rgba(110, 80, 185, 0.8));
        }
        .ma-btn-inactive {
            background: linear-gradient(to bottom, rgba(35, 35, 45, 0.95), rgba(60, 60, 75, 0.8));
            color: rgba(255,255,255,0.65) !important;
        }
        .ma-divider {
            width: 1px;
            background: rgba(209,213,219,0.5);
            flex-shrink: 0;
        }
        /* Responsive card width */
        .ma-card { width: 200px; }
        @media (max-width: 480px) {
            .ma-card { width: 150px; }
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1084747507972985"
     crossorigin="anonymous"></script>
</head>
<body class="text-white font-[Raleway]">
    <div id="page" class="max-w-[1280px] mx-auto px-4 sm:px-8 py-10">

        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold tracking-wide">Marvel Super Heroes</h1>
            <p class="text-white/60 mt-1 text-sm flex items-center">TCGPlayer prices via Scryfall<span id="fetch-date"></span><span id="catalog-currency" style="margin-left:12px"></span></p>

            <!-- Tab toggle -->
            <div id="mode-toggle" class="ma-toggle mt-4 ring-1 ring-gray-400"></div>
        </div>

        <!-- Loading state -->
        <div id="loading" class="text-white/60 text-lg py-20 text-center">Loading cards…</div>

        <!-- Buckets rendered here -->
        <div id="buckets" class="flex flex-col gap-8"></div>

        <!-- Footer -->
        <p class="text-white/30 text-xs mt-12 pb-6">
            Card prices and images via <a href="https://scryfall.com" class="underline hover:text-white/60" target="_blank">Scryfall</a>.
            Prices are TCGPlayer market price. Etched foil prices shown where available.
        </p>
    </div>

    <script src="./src/money.js?v=1.43"></script>
    <script src="./src/catalog.js?v=1.46"></script>
    <script>
        initCategoryCatalog({
            tabs: [
                {
                    id: 'boosterfun',
                    label: 'Booster Fun',
                    alwaysShowNormal: true,
                    query: '%28set%3Amsh+%28cn>%3D297+AND+cn<%3D429%29%29' +
                        '+OR+%28set%3Amar+%28cn>%3D41+AND+cn<%3D100%29%29&unique=cards',
                },
                {
                    id: 'scene',
                    label: 'Scene',
                    alwaysShowNormal: true,
                    query: 'set%3Amsh+%28cn>%3D314+AND+cn<%3D351%29&unique=cards',
                },
                {
                    id: 'logo',
                    label: 'Logo',
                    alwaysShowNormal: true,
                    query: 'set%3Amsh+%28cn>%3D352+AND+cn<%3D379%29&unique=cards',
                },
                {
                    id: 'panel',
                    label: 'Panel',
                    alwaysShowNormal: true,
                    query: 'set%3Amsh+%28cn>%3D297+AND+cn<%3D313%29&unique=cards',
                },
                {
                    id: 'classic-comic',
                    label: 'Classic Comic',
                    alwaysShowNormal: true,
                    query: 'set%3Amsh+%28cn>%3D387+AND+cn<%3D401%29&unique=cards',
                },
                {
                    id: 'source-material',
                    label: 'Source Material',
                    alwaysShowNormal: true,
                    query: 'set%3Amar+%28cn>%3D41+AND+cn<%3D100%29&unique=cards',
                },
                {
                    id: 'defaultframe',
                    label: 'Default Frame',
                    alwaysShowNormal: true,
                    query: 'set%3Amsh+%28rarity%3Ar+OR+rarity%3Am%29+cn<%3D276&unique=cards',
                },
            ],
            excludeBuckets: ['Under $1'],
        });
    </script>
</body>
</html>
